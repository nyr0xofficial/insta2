<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Acme Corp</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f5f4f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 2px 24px rgba(0,0,0,0.06);
        }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: #1a1a1a; margin-bottom: 4px; }
        .logo span { color: #e8a020; }
        h1 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 28px; color: #1a1a1a; margin: 24px 0 8px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
        .field { margin-bottom: 18px; }
        label { display: block; font-size: 12px; font-weight: 500; color: #555; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
        input, textarea, select {
            width: 100%; background: #f8f7f4; border: 1px solid #e5e3de; border-radius: 8px;
            padding: 12px 14px; color: #1a1a1a; font-family: 'DM Sans', sans-serif; font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        textarea { resize: vertical; min-height: 120px; }
        input:focus, textarea:focus, select:focus {
            outline: none; border-color: #e8a020; box-shadow: 0 0 0 3px rgba(232,160,32,0.12); background: white;
        }
        input::placeholder, textarea::placeholder { color: #bbb; }
        .error { font-size: 12px; color: #d94f4f; margin-top: 5px; display: none; }
        .error.visible { display: block; }
        button[type="submit"] {
            width: 100%; height: 50px; background: #1a1a1a; color: white; border: none;
            border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
            cursor: pointer; margin-top: 8px; transition: background 0.2s, transform 0.1s; position: relative;
        }
        button[type="submit"]:hover { background: #333; }
        button[type="submit"]:active { transform: scale(0.98); }
        button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
        .spinner {
            display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        .success { display: none; text-align: center; padding: 40px 0; }
        .success-icon { width: 56px; height: 56px; background: #eaf7ef; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 24px; }
        .success h2 { font-family: 'Syne', sans-serif; font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
        .success p { color: #888; font-size: 14px; }
        .char-count { text-align: right; font-size: 12px; color: #bbb; margin-top: 4px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">Acme<span>.</span></div>
    <div id="formSection">
        <h1>Nous contacter</h1>
        <p class="subtitle">Remplissez ce formulaire, nous vous répondrons sous 48h.</p>
        <form id="contactForm" action="/api/submit" method="POST">
            <div class="field">
                <label for="name">Nom complet</label>
                <input type="text" id="name" name="name" placeholder="Jean Dupont" required>
                <p class="error" id="nameError">Veuillez entrer votre nom.</p>
            </div>
            <div class="field">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" name="email" placeholder="jean@exemple.com" required>
                <p class="error" id="emailError">Adresse e-mail invalide.</p>
            </div>
            <div class="field">
                <label for="subject">Sujet</label>
                <select id="subject" name="subject" required>
                    <option value="" disabled selected>Choisissez un sujet</option>
                    <option value="question">Question générale</option>
                    <option value="support">Support technique</option>
                    <option value="partenariat">Partenariat</option>
                    <option value="autre">Autre</option>
                </select>
                <p class="error" id="subjectError">Veuillez choisir un sujet.</p>
            </div>
            <div class="field">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Décrivez votre demande..." required maxlength="500" oninput="updateCount(this)"></textarea>
                <div class="char-count"><span id="charCount">0</span>/500</div>
                <p class="error" id="messageError">Le message doit faire au moins 20 caractères.</p>
            </div>
            <p class="error" id="globalError" style="margin-bottom:10px;"></p>
            <button type="submit" id="submitBtn">
                <span id="btnText">Envoyer le message</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>
    </div>
    <div class="success" id="successSection">
        <div class="success-icon">✅</div>
        <h2>Message envoyé !</h2>
        <p>Merci pour votre message.<br>Nous vous répondrons sous 48h.</p>
    </div>
</div>
<script>
function updateCount(el) { document.getElementById('charCount').textContent = el.value.length; }
const form = document.getElementById('contactForm');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const spinner = document.getElementById('spinner');
function setLoading(on) {
    submitBtn.disabled = on;
    btnText.style.visibility = on ? 'hidden' : 'visible';
    spinner.style.display = on ? 'block' : 'none';
}
function showError(id, msg) {
    const el = document.getElementById(id);
    if (msg) el.textContent = msg;
    el.classList.add('visible');
}
function clearErrors() { document.querySelectorAll('.error').forEach(e => e.classList.remove('visible')); }
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();
    const name    = document.getElementById('name').value.trim();
    const email   = document.getElementById('email').value.trim();
    const subject = document.getElementById('subject').value;
    const message = document.getElementById('message').value.trim();
    let valid = true;
    if (!name)   { showError('nameError');    valid = false; }
    if (!document.getElementById('email').validity.valid) { showError('emailError'); valid = false; }
    if (!subject) { showError('subjectError'); valid = false; }
    if (message.length < 20) { showError('messageError'); valid = false; }
    if (!valid) return;
    setLoading(true);
    try {
        const res = await fetch('/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, subject, message })
        });
        if (res.ok) {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('successSection').style.display = 'block';
        } else {
            showError('globalError', 'Une erreur est survenue. Réessayez.');
        }
    } catch {
        showError('globalError', 'Erreur réseau. Vérifiez votre connexion.');
    } finally {
        setLoading(false);
    }
});
</script>
</body>
</html>
